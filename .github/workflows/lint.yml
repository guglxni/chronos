# Superseded by ci.yml — kept as a redirect so any existing branch-protection
# rules that reference "CHRONOS Lint and Types" still resolve.
# Delete this file once branch protection rules are updated to "CHRONOS CI".
name: CHRONOS Lint and Types

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  redirect:
    name: "⚠ Moved to ci.yml — see CHRONOS CI workflow"
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "This workflow is superseded by .github/workflows/ci.yml"
          echo "Branch protection should reference 'CHRONOS CI' jobs instead."
