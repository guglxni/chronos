name: Dependency Review

# Runs on every PR — compares new/changed dependencies against known
# vulnerability databases (OSV, GitHub Advisory Database).
on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write  # To post a comment summarising findings

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/dependency-review-action@v4
        with:
          # Fail on HIGH or CRITICAL vulnerabilities in new/upgraded deps
          fail-on-severity: high
          # Post a summary comment on the PR
          comment-summary-in-pr: always
          # Deny GPL-3 in production deps (data-platform licensing concern)
          deny-licenses: GPL-3.0
