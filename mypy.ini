[mypy]
python_version = 3.11
plugins = pydantic.mypy
strict_optional = True
warn_unused_ignores = True
warn_return_any = True
warn_redundant_casts = True
disallow_untyped_defs = True
disallow_incomplete_defs = True
check_untyped_defs = True
no_implicit_optional = True
files = chronos/

# Third-party stubs are absent — suppress missing-import errors per library
[mypy-langfuse.*]
ignore_missing_imports = True

[mypy-traceloop.*]
ignore_missing_imports = True

[mypy-langgraph.*]
ignore_missing_imports = True

[mypy-langchain.*]
ignore_missing_imports = True

[mypy-prov.*]
ignore_missing_imports = True

[mypy-graphiti_core.*]
ignore_missing_imports = True

[mypy-chronos.graphiti_client]
ignore_errors = True

[mypy-litellm.*]
ignore_missing_imports = True

[mypy-opentelemetry.*]
ignore_missing_imports = True

[mypy-slowapi.*]
ignore_missing_imports = True

[mypy-sse_starlette.*]
ignore_missing_imports = True

[mypy-sqlglot.*]
ignore_missing_imports = True

# sql_parser.py assigns None to sqlglot/exp in the except ImportError block.
# Those type: ignore[assignment] are unreachable when sqlglot is installed, so
# suppress the "unused ignore" warning for that file only.
[mypy-chronos.code_intel.sql_parser]
warn_unused_ignores = False

[mypy-networkx.*]
ignore_missing_imports = True

[mypy-numpy.*]
ignore_missing_imports = True

[mypy-falkordb.*]
ignore_missing_imports = True

[mypy-mcp.*]
ignore_missing_imports = True
